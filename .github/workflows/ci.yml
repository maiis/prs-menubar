name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: |
          xcodebuild -project "PRs MenuBar.xcodeproj" \
            -scheme "PRs MenuBar" \
            -configuration Debug \
            -destination 'platform=macOS' \
            build

      - name: Test
        run: |
          xcodebuild -project "PRs MenuBar.xcodeproj" \
            -scheme "PRs MenuBar" \
            -configuration Debug \
            -destination 'platform=macOS' \
            test
