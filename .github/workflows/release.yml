name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write  # Required for creating releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Import Code Signing Certificates
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Build app
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          xcodebuild -project "PRs MenuBar.xcodeproj" \
            -scheme "PRs MenuBar" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/PRsMenuBar.xcarchive" \
            -destination 'platform=macOS' \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            archive

      - name: Export app
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          # Update exportOptions.plist with team ID from secrets
          sed -i.bak "s/AR3H59SG7B/$DEVELOPMENT_TEAM/g" exportOptions.plist

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/PRsMenuBar.xcarchive" \
            -exportOptionsPlist exportOptions.plist \
            -exportPath "$RUNNER_TEMP/export"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Create a ZIP for notarization
          ditto -c -k --keepParent "$RUNNER_TEMP/export/PRs MenuBar.app" "$RUNNER_TEMP/PRsMenuBar.zip"

          # Submit for notarization
          xcrun notarytool submit "$RUNNER_TEMP/PRsMenuBar.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the notarization ticket
          xcrun stapler staple "$RUNNER_TEMP/export/PRs MenuBar.app"

      - name: Install create-dmg
        run: |
          if ! command -v create-dmg &> /dev/null; then
            echo "Installing create-dmg..."
            brew install create-dmg
          else
            echo "create-dmg already installed"
          fi

      - name: Create DMG
        run: |
          # Create DMG with create-dmg for better appearance
          if create-dmg \
            --volname "PRs MenuBar" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "PRs MenuBar.app" 175 190 \
            --hide-extension "PRs MenuBar.app" \
            --app-drop-link 425 190 \
            "$RUNNER_TEMP/PRsMenuBar-${{ steps.version.outputs.VERSION }}.dmg" \
            "$RUNNER_TEMP/export/PRs MenuBar.app"; then
            echo "DMG created successfully with create-dmg"
          else
            echo "create-dmg failed, falling back to hdiutil"
            # Create a temporary directory for the DMG contents
            mkdir -p "$RUNNER_TEMP/dmg-contents"
            cp -R "$RUNNER_TEMP/export/PRs MenuBar.app" "$RUNNER_TEMP/dmg-contents/"
            hdiutil create \
              -volname "PRs MenuBar" \
              -srcfolder "$RUNNER_TEMP/dmg-contents" \
              -ov -format UDZO \
              "$RUNNER_TEMP/PRsMenuBar-${{ steps.version.outputs.VERSION }}.dmg"
            rm -rf "$RUNNER_TEMP/dmg-contents"
          fi

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Submit DMG for notarization
          xcrun notarytool submit "$RUNNER_TEMP/PRsMenuBar-${{ steps.version.outputs.VERSION }}.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the notarization ticket to DMG
          xcrun stapler staple "$RUNNER_TEMP/PRsMenuBar-${{ steps.version.outputs.VERSION }}.dmg"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/PRsMenuBar-${{ steps.version.outputs.VERSION }}.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f $RUNNER_TEMP/build_certificate.p12 || true
